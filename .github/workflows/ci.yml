name: CI

on:
  push:
    tags:
      - "*"
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group test

      - name: Run tests
        id: tests
        env:
          BEAVERHABITS_CONFIG_PATH: /tmp/com.kevincojean.beaverhabits-tui/config.json
        run: |
          EXIT=0
          uv run infra/ccli test || EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT

      - name: Validate test result
        if: steps.tests.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        run: |
          if [ -z "$EXIT_CODE" ]; then
            echo "::error::Failed to capture test exit code"
            exit 1
          fi
          if ${{ contains(github.ref_name, 'rc') }}; then
            case "$EXIT_CODE" in
              1|5)
                echo "::warning::RC tag: test issues tolerated (pytest exit code $EXIT_CODE)"
                exit 0
                ;;
              *)
                echo "::error::Infrastructure failure on RC tag (exit code $EXIT_CODE)"
                exit 1
                ;;
            esac
          else
            echo "::error::Tests failed on release tag ${{ github.ref_name }} (exit code $EXIT_CODE)"
            exit 1
          fi
