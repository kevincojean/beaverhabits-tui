name: CI

on:
  push:
    tags:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        id: tests
        run: uv run infra/test_runner.py test
        continue-on-error: ${{ contains(github.ref_name, 'rc') }}

      - name: Verify release tests passed
        if: ${{ !contains(github.ref_name, 'rc') && steps.tests.outcome == 'failure' }}
        run: |
          echo "::error::Tests failed on release tag ${{ github.ref_name }}"
          exit 1
